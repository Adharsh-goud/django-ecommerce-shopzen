{% extends 'main.html' %}

{% block content %}

<style>
.success-box {
    text-align: center;
    margin-top: 80px;
}

.success-box h2 {
    color: #28a745;
}

.success-btns {
    margin-top: 20px;
}

.success-btns a {
    display: inline-block;
    margin: 10px;
    padding: 10px 18px;
    border-radius: 8px;
    text-decoration: none;
    font-weight: 500;
}

.shop-btn {
    background: #0b1a35;
    color: #fff;
}

.orders-btn {
    background: #ffc107;
    color: #000;
}
</style>

<div class="success-box">

    <h2>✅ Order Placed Successfully!</h2>
    <p>Your order has been placed.</p>

    <div class="success-btns">
        <a href="{% url 'home' %}" class="shop-btn">
            Continue Shopping
        </a>

        <a href="{% url 'orders' %}" class="orders-btn">
            Go to My Orders
        </a>
    </div>

</div>

{% endblock %}
