{% extends 'main.html' %}

{% block content %}

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    background: linear-gradient(135deg, #0b1a35, #1c2f5a);
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Glass card */
.login-box {
    width: 100%;
    max-width: 380px;
    padding: 35px 30px;
    border-radius: 16px;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(12px);
    box-shadow: 0 20px 50px rgba(0,0,0,0.25);
    color: #fff;
}

/* Title */
.login-box h1 {
    text-align: center;
    margin-bottom: 25px;
    font-size: 26px;
    font-weight: 600;
}

/* Input group */
.input-group {
    margin-bottom: 18px;
}

/* Labels */
.input-group label {
    display: block;
    font-size: 13px;
    margin-bottom: 6px;
    opacity: 0.8;
}

/* Inputs */
.input-group input {
    width: 100%;
    padding: 10px 12px;
    border-radius: 8px;
    border: none;
    outline: none;
    font-size: 14px;
    background: rgba(255,255,255,0.15);
    color: #fff;
}

/* Input focus */
.input-group input:focus {
    background: rgba(255,255,255,0.25);
}

/* Button */
.login-btn {
    width: 100%;
    padding: 11px;
    border-radius: 8px;
    border: none;
    background: #ffc107;
    color: #000;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
    margin-top: 10px;
}

.login-btn:hover {
    background: #e0a800;
}

/* Links */
.extra-links {
    text-align: center;
    margin-top: 18px;
}

.extra-links a {
    display: block;
    color: #ddd;
    text-decoration: none;
    font-size: 13px;
    margin: 5px 0;
    transition: 0.2s;
}

.extra-links a:hover {
    color: #ffc107;
}

/* Responsive */
@media (max-width: 480px) {
    .login-box {
        margin: 0 15px;
        padding: 25px 20px;
    }
}
</style>

<div class="login-box">
    <h1>Welcome Back</h1>

    <form method="POST">
        {% csrf_token %}

        <div class="input-group">
            <label>Username</label>
            <input type="text" name="username">
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" name="password">
        </div>

        <button type="submit" class="login-btn">Login</button>
    </form>

    <div class="extra-links">
        <a href="{% url 'reset_password' %}">Forgot Password?</a>
        <a href="{% url 'register' %}">Create Account</a>
    </div>
</div>

{% endblock %}
