{% extends 'main.html' %}

{% block content %}

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    background: radial-gradient(circle at top, #1c2f5a, #0b1a35);
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Card */
.reset-box {
    width: 100%;
    max-width: 400px;
    padding: 35px 30px;
    border-radius: 18px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(14px);
    box-shadow: 0 25px 60px rgba(0,0,0,0.3);
    color: #fff;
}

/* Title */
.reset-box h1 {
    text-align: center;
    margin-bottom: 25px;
    font-size: 24px;
}

/* Floating input group */
.input-group {
    position: relative;
    margin-bottom: 22px;
}

/* Inputs */
.input-group input {
    width: 100%;
    padding: 12px 10px;
    border-radius: 8px;
    border: none;
    outline: none;
    font-size: 14px;
    background: rgba(255,255,255,0.15);
    color: #fff;
}

/* Labels */
.input-group label {
    position: absolute;
    top: 50%;
    left: 10px;
    transform: translateY(-50%);
    font-size: 13px;
    color: #ccc;
    pointer-events: none;
    transition: 0.3s;
}

/* Floating effect */
.input-group input:focus + label,
.input-group input:valid + label {
    top: -8px;
    font-size: 11px;
    color: #ffc107;
}

/* Focus */
.input-group input:focus {
    background: rgba(255,255,255,0.25);
}

/* Button */
.reset-btn {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: none;
    background: #ffc107;
    color: #000;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

.reset-btn:hover {
    background: #e0a800;
}

/* Back link */
.back-link {
    text-align: center;
    margin-top: 18px;
}

.back-link a {
    color: #ccc;
    text-decoration: none;
    font-size: 13px;
}

.back-link a:hover {
    color: #ffc107;
}

/* Responsive */
@media (max-width: 480px) {
    .reset-box {
        margin: 0 15px;
        padding: 25px 20px;
    }
}
</style>

<div class="reset-box">
    <h1>Reset Password</h1>

    <form method="POST">
        {% csrf_token %}

        <div class="input-group">
            <input type="text" name="username" required>
            <label>Username</label>
        </div>

        <div class="input-group">
            <input type="password" name="password" required>
            <label>New Password</label>
        </div>

        <button type="submit" class="reset-btn">Update Password</button>
    </form>

    <div class="back-link">
        <a href="{% url 'login_' %}">Back to Login</a>
    </div>
</div>

{% endblock %}
