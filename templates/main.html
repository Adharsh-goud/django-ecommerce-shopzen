{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopzen</title>

    <!-- Main CSS -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    {% block css %}
    {% endblock %}

    <!-- Toast CSS -->
    <style>
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #0b1a35;
            color: #fff;
            padding: 12px 18px;
            border-radius: 8px;
            font-size: 14px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.3s ease;
            z-index: 9999;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    {% include 'nav.html' %}

    <!-- Page Content -->
    {% block content %}
    {% endblock %}

    <!-- Toast Box -->
    <div id="toast" class="toast"></div>

    <!-- Toast Function -->
    <script>
    function showToast(message) {
        const toast = document.getElementById("toast");

        toast.innerText = message;
        toast.classList.add("show");

        setTimeout(() => {
            toast.classList.remove("show");
        }, 2000);
    }
    </script>

    <!-- Django Messages (NO editor error version) -->
    {% if messages %}
    <script id="django-messages" type="application/json">
    [
        {% for message in messages %}
            "{{ message|escapejs }}"{% if not forloop.last %},{% endif %}
        {% endfor %}
    ]
    </script>

    <script>
    window.addEventListener("load", function () {
        const data = document.getElementById("django-messages");
        if (!data) return;

        const messages = JSON.parse(data.textContent);

        messages.forEach(msg => showToast(msg));
    });
    </script>
    {% endif %}

</body>
</html>
